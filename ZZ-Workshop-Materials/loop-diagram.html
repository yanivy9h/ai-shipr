<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI-SHIPR — The Loop</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #e8e0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .canvas {
      width: 1080px;
      height: 1080px;
      background: #F8F4FB;
      position: relative;
      overflow: hidden;
    }
    /* bg accents */
    .canvas::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, #FF69B415 0%, transparent 70%);
      top: -120px; right: -120px;
    }
    .canvas::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, #D8BFD830 0%, transparent 70%);
      bottom: -100px; left: -100px;
    }
    .title {
      position: absolute;
      top: 52px;
      left: 0; right: 0;
      text-align: center;
    }
    .title-tag {
      display: inline-block;
      background: #FF69B4;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 12px;
      border-radius: 100px;
      margin-bottom: 10px;
    }
    .title h1 {
      font-size: 32px;
      font-weight: 800;
      color: #7B2D8E;
    }
    .title p {
      font-size: 14px;
      color: #9B7BAE;
      margin-top: 4px;
    }
    svg.loop {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -46%);
    }
    .footer {
      position: absolute;
      bottom: 36px;
      left: 0; right: 0;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: #9B7BAE;
    }
    .footer span { color: #7B2D8E; }
  </style>
</head>
<body>
<div class="canvas">

  <div class="title">
    <div class="title-tag">AI-SHIPR</div>
    <h1>The Product Loop</h1>
    <p>Every phase feeds the next. Learning.md closes the loop.</p>
  </div>

  <svg class="loop" width="820" height="720" viewBox="0 0 820 720">
    <defs>
      <!-- Arrow marker -->
      <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="#D8BFD8"/>
      </marker>
      <marker id="arrow-pink" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="#FF69B4"/>
      </marker>
    </defs>

    <!-- ── Orbit ring ── -->
    <circle cx="410" cy="360" r="240" fill="none" stroke="#D8BFD8" stroke-width="1.5" stroke-dasharray="6 5"/>

    <!-- ── Arrows on the ring (arcs between nodes) ── -->
    <!-- We draw curved arrows between the 6 node positions -->
    <!-- Positions (r=240, center 410,360):
         0: Strategy   top        410, 120
         1: Plan       top-right  618, 240
         2: Build      bot-right  618, 480
         3: Launch     bottom     410, 600
         4: Measure    bot-left   202, 480
         5: Learn      top-left   202, 240
    -->

    <!-- Arrows: each arc goes from one node edge to the next -->
    <path d="M 450,128 A 240,240 0 0,1 600,252" fill="none" stroke="#D8BFD8" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 620,292 A 240,240 0 0,1 620,448" fill="none" stroke="#D8BFD8" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 598,492 A 240,240 0 0,1 452,592" fill="none" stroke="#D8BFD8" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 368,600 A 240,240 0 0,1 222,492" fill="none" stroke="#D8BFD8" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M 200,448 A 240,240 0 0,1 200,292" fill="none" stroke="#D8BFD8" stroke-width="2" marker-end="url(#arrow)"/>
    <!-- Learn → Strategy (highlighted pink) -->
    <path d="M 222,248 A 240,240 0 0,1 370,128" fill="none" stroke="#FF69B4" stroke-width="2.5" marker-end="url(#arrow-pink)"/>

    <!-- ══ CENTER ══ -->
    <circle cx="410" cy="360" r="88" fill="#fff" stroke="#D8BFD8" stroke-width="1.5"/>
    <text x="410" y="348" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="700" fill="#7B2D8E">Learning.md</text>
    <text x="410" y="368" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#9B7BAE">loop memory</text>
    <text x="410" y="386" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#9B7BAE">updated every session</text>

    <!-- ══ NODE HELPER (cx, cy, number, label, sublabel, highlight) ══ -->

    <!-- 1 — Strategy (top, 410,120) -->
    <circle cx="410" cy="120" r="52" fill="#7B2D8E" stroke="none"/>
    <text x="410" y="114" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#fff">Strategy</text>
    <text x="410" y="131" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#D8BFD8">Vision · KPIs · Bets</text>

    <!-- 2 — Plan (top-right, 618,240) -->
    <circle cx="618" cy="240" r="52" fill="#fff" stroke="#D8BFD8" stroke-width="1.5"/>
    <text x="618" y="234" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#7B2D8E">Plan</text>
    <text x="618" y="251" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#9B7BAE">Sprint · Roadmap</text>

    <!-- 3 — Build (bot-right, 618,480) -->
    <circle cx="618" cy="480" r="52" fill="#fff" stroke="#D8BFD8" stroke-width="1.5"/>
    <text x="618" y="474" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#7B2D8E">Build</text>
    <text x="618" y="491" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#9B7BAE">Dev · Decisions</text>

    <!-- 4 — Launch (bottom, 410,600) -->
    <circle cx="410" cy="600" r="52" fill="#fff" stroke="#D8BFD8" stroke-width="1.5"/>
    <text x="410" y="594" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#7B2D8E">Launch</text>
    <text x="410" y="611" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#9B7BAE">Go-to-market</text>

    <!-- 5 — Measure (bot-left, 202,480) -->
    <circle cx="202" cy="480" r="52" fill="#fff" stroke="#D8BFD8" stroke-width="1.5"/>
    <text x="202" y="474" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#7B2D8E">Measure</text>
    <text x="202" y="491" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#9B7BAE">Data · Hypothesis</text>

    <!-- 6 — Learn (top-left, 202,240) — pink highlight -->
    <circle cx="202" cy="240" r="52" fill="#FF69B4" stroke="none"/>
    <text x="202" y="234" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="700" fill="#fff">Learn</text>
    <text x="202" y="251" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" fill="#fff">Retro · Insights</text>

    <!-- Pink label on the Learn→Strategy arc -->
    <text x="282" y="158" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="600" fill="#FF1493">closes the loop</text>

  </svg>

  <div class="footer">
    <span>AI-SHIPR</span> by Yaniv Yaakubovich &nbsp;·&nbsp; verve-pm.com
  </div>

</div>
</body>
</html>
